<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack de Hechicería</title>
  <style>
    body{
      margin:0;
      background:#000;
      font-family:Arial, sans-serif;

    }

    .contenedor{
      max-width:700px;
      margin:0 auto;
      padding:20px 15px 40px;
    }

    .imagen-pack{
      width:100%;
      max-width:650px;
      border-radius:18px;
      box-shadow:0 0 25px rgba(255,0,0,0.35);
      display:block;
      margin:0 auto 25px;
    }

    .boton-whatsapp{
      display:inline-block;
      background:#25D366;
      color:#fff;
      text-decoration:none;
      font-size:22px;
      font-weight:bold;
      padding:18px 28px;
      border-radius:14px;
      box-shadow:0 0 18px rgba(37,211,102,0.35);
    }

    .boton-whatsapp:active,
    .boton-whatsapp:hover{
      opacity:0.95;
    }

    .texto{
      color:#fff;
      font-size:18px;
      margin:0 0 18px;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <img src="pack-hechiceria.PNG" alt="Pack de Hechicería" class="imagen-pack">

    <p class="texto">📲 Contáctame por WhatsApp para recibir el acceso</p>

    <a
      class="boton-whatsapp"
      href="https://wa.me/524791950206?text=Hola,%20me%20interesa%20el%20Pack%20de%20Hechicer%C3%ADa"
      target="_blank"
    >
      Enviar por WhatsApp
    </a>
  </div>
</body>
</html>
