<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú | Las Ranas</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#d49a37,#f2c06a);
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.hero{
  background:#355b21;
  color:#fff;
  text-align:center;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

.producto{
  background:#f8e7c8;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
}

.producto img{
  width:100%;
  border-radius:15px;
}

.precio{
  font-size:20px;
  font-weight:bold;
  color:green;
}

.contador{
  display:flex;
  align-items:center;
  margin-top:10px;
}

.contador button{
  width:50px;
  height:50px;
  font-size:20px;
}

.contador span{
  width:60px;
  text-align:center;
  font-size:20px;
}

.confirmar{
  margin-left:10px;
  padding:10px;
  background:green;
  color:white;
  border:none;
  border-radius:10px;
}

.resumen{
  background:#fff;
  padding:15px;
  border-radius:20px;
  margin-top:20px;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}

.btn{
  width:100%;
  margin-top:10px;
  padding:15px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🐸 Menú Las Ranas</h1>
</div>

<!-- HAMBURGUESA -->
<div class="producto">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80">
<h2>Hamburguesa</h2>
<div class="precio">$100</div>
<div class="contador">
<button onclick="cambiar('hamburguesa',-1)">-</button>
<span id="hamburguesa">0</span>
<button onclick="cambiar('hamburguesa',1)">+</button>
<button class="confirmar" onclick="confirmar('hamburguesa',100)">OK</button>
</div>
</div>

<!-- TACOS -->
<div class="producto">
<img src="https://images.unsplash.com/photo-1613514785940-daed07799d9b?auto=format&fit=crop&w=800&q=80">
<h2>Tacos</h2>
<div class="precio">$100</div>
<div class="contador">
<button onclick="cambiar('tacos',-1)">-</button>
<span id="tacos">0</span>
<button onclick="cambiar('tacos',1)">+</button>
<button class="confirmar" onclick="confirmar('tacos',100)">OK</button>
</div>
</div>

<!-- PIZZA -->
<div class="producto">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80">
<h2>Pizza</h2>
<div class="precio">$150</div>
<div class="contador">
<button onclick="cambiar('pizza',-1)">-</button>
<span id="pizza">0</span>
<button onclick="cambiar('pizza',1)">+</button>
<button class="confirmar" onclick="confirmar('pizza',150)">OK</button>
</div>
</div>

<!-- BONELESS -->
<div class="producto">
<img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=800&q=80">
<h2>Boneless</h2>
<div class="precio">$120</div>
<div class="contador">
<button onclick="cambiar('boneless',-1)">-</button>
<span id="boneless">0</span>
<button onclick="cambiar('boneless',1)">+</button>
<button class="confirmar" onclick="confirmar('boneless',120)">OK</button>
</div>
</div>

<!-- HOT DOGS -->
<div class="producto">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=800&q=80">
<h2>Hot Dogs</h2>
<div class="precio">$30</div>
<div class="contador">
<button onclick="cambiar('hotdogs',-1)">-</button>
<span id="hotdogs">0</span>
<button onclick="cambiar('hotdogs',1)">+</button>
<button class="confirmar" onclick="confirmar('hotdogs',30)">OK</button>
</div>
</div>

<!-- RESUMEN -->
<div class="resumen">
<h3>Pedido</h3>
<div id="lista"></div>
<h2 id="total">Total: $0</h2>

<textarea id="direccion" placeholder="Escribe tu dirección"></textarea>

<button class="btn" onclick="enviar()">Enviar por WhatsApp</button>
</div>

</div>

<script>

const numero = "5218142971136";

let cantidades = {
hamburguesa:0,
tacos:0,
pizza:0,
boneless:0,
hotdogs:0
};

let pedido = {};

function cambiar(p,c){
cantidades[p]+=c;
if(cantidades[p]<0) cantidades[p]=0;
if(cantidades[p]>9) cantidades[p]=9;
document.getElementById(p).innerText=cantidades[p];
}

function confirmar(p,precio){
if(cantidades[p]==0){
delete pedido[p];
}else{
pedido[p]={cant:cantidades[p],precio:precio};
}
actualizar();
}

function actualizar(){
let txt="";
let total=0;

for(let p in pedido){
let sub=pedido[p].cant*pedido[p].precio;
total+=sub;
txt+=p+" x"+pedido[p].cant+" = $"+sub+"<br>";
}

document.getElementById("lista").innerHTML=txt;
document.getElementById("total").innerText="Total: $"+total;
}

function enviar(){
if(Object.keys(pedido).length==0){
alert("Agrega productos");
return;
}

let dir=document.getElementById("direccion").value;
if(dir==""){
alert("Escribe dirección");
return;
}

let total=0;
let msg="Pedido:%0A";

for(let p in pedido){
let sub=pedido[p].cant*pedido[p].precio;
total+=sub;
msg+=p+" x"+pedido[p].cant+" = $"+sub+"%0A";
}

msg+="Total: $"+total+"%0A";
msg+="Dirección: "+dir;

window.location.href="https://api.whatsapp.com/send?phone="+numero+"&text="+encodeURIComponent(msg);
}

</script>

</body>
</html>
