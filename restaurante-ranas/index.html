<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurante Las Ranas</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #c88a1d, #e0a037);
      color:#111;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .logo{
      width:100%;
      border-radius:25px;
      display:block;
      margin-bottom:20px;
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    h1{
      text-align:center;
      font-size:2.6rem;
      margin:10px 0;
    }

    .subtitle{
      text-align:center;
      font-size:1.2rem;
      font-weight:bold;
      margin-bottom:20px;
    }

    .info-box{
      background: rgba(255,255,255,0.3);
      border-radius:20px;
      padding:18px;
      margin-bottom:20px;
      text-align:center;
      font-weight:bold;
      box-shadow:0 6px 16px rgba(0,0,0,0.15);
      line-height:1.5;
    }

    .btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      font-size:1.1rem;
      font-weight:bold;
      padding:18px;
      border-radius:20px;
      margin-bottom:15px;
      box-shadow:0 6px 16px rgba(0,0,0,0.15);
    }

    .btn-location{
      background:#fff;
      color:#111;
    }

    .btn-menu{
      background:#28d764;
      color:#fff;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo-ranas.jpg" class="logo" alt="Las Ranas">

  <!-- TITULO -->
  <h1>🐸 Restaurante Las Ranas</h1>
  <div class="subtitle">Comer aquí o envío a domicilio</div>

  <!-- INFO -->
  <div class="info-box">
    📍 Dirección: MZA 5 LT 74, Genaro Vázquez<br>
    📞 Teléfono: 8147303097
  </div>

  <!-- BOTON UBICACION -->
  <a class="btn btn-location" href="https://maps.google.com/?q=MZA+5+LT+74+Genaro+Vazquez" target="_blank">
    📍 Ver ubicación
  </a>

  <!-- BOTON MENU (IMPORTANTE) -->
  <a class="btn btn-menu" href="menu.html">
    📖 Ver menú
  </a>

</div>

</body>
</html>
