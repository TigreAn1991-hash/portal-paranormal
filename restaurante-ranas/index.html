<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante Las Ranas</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#111;
      color:#fff;
    }
    .hero{
      min-height:100vh;
      background:linear-gradient(180deg,#f5c56c,#d98a17);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:24px 16px;
    }
    .logo{
      width:100%;
      max-width:520px;
      border-radius:18px;
      box-shadow:0 10px 28px rgba(0,0,0,.22);
      margin-bottom:20px;
    }
    h1{
      margin:0 0 10px;
      font-size:38px;
      color:#2b1b0f;
    }
    .sub{
      margin:0 0 22px;
      font-size:20px;
      font-weight:bold;
      color:#2b1b0f;
    }
    .datos{
      background:rgba(255,255,255,.25);
      color:#2b1b0f;
      padding:16px;
      border-radius:16px;
      max-width:680px;
      width:100%;
      margin-bottom:22px;
      font-weight:bold;
      line-height:1.6;
    }
    .botones{
      display:flex;
      flex-direction:column;
      gap:14px;
      width:100%;
      max-width:420px;
    }
    .btn{
      display:block;
      text-decoration:none;
      padding:16px 20px;
      border-radius:14px;
      font-size:20px;
      font-weight:bold;
      text-align:center;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }
    .ubicacion{
      background:#fff;
      color:#111;
    }
    .menu{
      background:#25D366;
      color:#fff;
    }
  </style>
</head>
<body>
  <section class="hero">
    <img src="logo-ranas.jpg" alt="Las Ranas" class="logo">

    <h1>🐸 Restaurante Las Ranas</h1>
    <p class="sub">Comer aquí o envío a domicilio</p>

    <div class="datos">
      📍 Dirección: MZA 5 LT 74, Genaro Vázquez<br>
      📞 Teléfono: 8147303097
    </div>

    <div class="botones">
      <a class="btn ubicacion" href="https://maps.google.com/?q=MZA+5+LT+74,+Genaro+Vázquez" target="_blank">
        📍 Ver ubicación
      </a>

      <a class="btn menu" href="menu.html">
        📖 Ver menú
      </a>
    </div>
  </section>
</body>
</html>
